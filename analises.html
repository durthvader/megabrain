<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Megabrain · Análises</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/cards.css" />
  <link rel="stylesheet" href="assets/css/formularios.css" />
</head>
<body data-page="analises">
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="area-principal">
      <header class="topo">
        <button class="btn-menu" id="btn-menu" aria-label="Abrir menu">☰</button>
        <h1 class="topo-titulo">Análises</h1>
      </header>
      <main class="conteudo">
        <div class="alerta alerta-info">
          Fluxo sugerido: use o <strong>Codex/Claude no VS Code</strong> para analisar as tabelas da demanda
          no Supabase e registre aqui o resultado. Prompts prontos em <code>docs/prompts-codex.md</code>.
        </div>

        <section class="secao card">
          <h2 class="card-titulo">Nova análise</h2>
          <form id="form-analise">
            <div class="linha-campos">
              <div class="campo">
                <label for="select-demanda">Demanda *</label>
                <select id="select-demanda" required><option value="">Carregando…</option></select>
              </div>
              <div class="campo">
                <label for="analise-titulo">Título *</label>
                <input id="analise-titulo" name="titulo" required placeholder="Ex.: Ofensores de hora extra em junho" />
              </div>
            </div>
            <div class="campo">
              <label for="analise-pergunta">Pergunta</label>
              <input id="analise-pergunta" name="pergunta" placeholder="O que esta análise responde?" />
            </div>
            <div class="campo">
              <label for="analise-resumo">Resumo</label>
              <textarea id="analise-resumo" name="resumo"></textarea>
            </div>
            <div class="linha-campos">
              <div class="campo">
                <label for="analise-evidencias">Evidências</label>
                <textarea id="analise-evidencias" name="evidencias"></textarea>
              </div>
              <div class="campo">
                <label for="analise-hipoteses">Hipóteses</label>
                <textarea id="analise-hipoteses" name="hipoteses"></textarea>
              </div>
            </div>
            <div class="linha-campos">
              <div class="campo">
                <label for="analise-sugestoes">Sugestões</label>
                <textarea id="analise-sugestoes" name="sugestoes"></textarea>
              </div>
              <div class="campo">
                <label for="analise-proximos">Próximos passos</label>
                <textarea id="analise-proximos" name="proximos_passos"></textarea>
              </div>
            </div>
            <div class="acoes-formulario">
              <button class="btn btn-primario" type="submit">Salvar análise</button>
            </div>
          </form>
        </section>

        <section class="secao">
          <h2>Análises da demanda</h2>
          <div class="lista-cartoes" id="lista-analises"></div>
          <div class="vazio" id="analises-vazio">Selecione uma demanda para ver as análises.</div>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="assets/js/pages/analisesPage.js"></script>
</body>
</html>
