<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Megabrain · Demandas</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/cards.css" />
  <link rel="stylesheet" href="assets/css/tabelas.css" />
  <link rel="stylesheet" href="assets/css/formularios.css" />
</head>
<body data-page="demandas">
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="area-principal">
      <header class="topo">
        <button class="btn-menu" id="btn-menu" aria-label="Abrir menu">☰</button>
        <h1 class="topo-titulo">Demandas</h1>
      </header>
      <main class="conteudo">
        <section class="secao card">
          <h2 class="card-titulo">Nova demanda</h2>
          <form id="form-demanda">
            <div class="linha-campos">
              <div class="campo">
                <label for="demanda-nome">Nome *</label>
                <input id="demanda-nome" name="nome" required placeholder="Ex.: Escala próximos 30 dias" />
              </div>
              <div class="campo">
                <label for="demanda-tipo">Tipo *</label>
                <select id="demanda-tipo" name="tipo" required>
                  <option value="escala">escala</option>
                  <option value="custos">custos</option>
                  <option value="indicadores">indicadores</option>
                  <option value="formulario">formulario</option>
                  <option value="analise_livre">analise_livre</option>
                </select>
              </div>
              <div class="campo">
                <label for="demanda-responsavel">Responsável</label>
                <input id="demanda-responsavel" name="responsavel" placeholder="Quem responde pela demanda" />
              </div>
            </div>
            <div class="linha-campos">
              <div class="campo">
                <label for="demanda-inicio">Data início</label>
                <input id="demanda-inicio" name="data_inicio" type="date" />
              </div>
              <div class="campo">
                <label for="demanda-fim">Data fim</label>
                <input id="demanda-fim" name="data_fim" type="date" />
              </div>
            </div>
            <div class="campo">
              <label for="demanda-descricao">Descrição</label>
              <textarea id="demanda-descricao" name="descricao" placeholder="Contexto e objetivo da demanda"></textarea>
            </div>
            <div class="acoes-formulario">
              <button class="btn btn-primario" type="submit">Criar demanda</button>
            </div>
            <p class="campo-ajuda">O token público e o link do formulário são gerados automaticamente.</p>
          </form>
        </section>

        <section class="secao">
          <h2>Demandas existentes</h2>
          <div class="tabela-container">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Tipo</th>
                  <th>Responsável</th>
                  <th>Período</th>
                  <th>Status</th>
                  <th>Token público</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tabela-demandas-corpo"></tbody>
            </table>
          </div>
          <div class="vazio oculto" id="demandas-vazio">Nenhuma demanda ainda. Crie a primeira acima.</div>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="assets/js/pages/demandasPage.js"></script>
</body>
</html>
